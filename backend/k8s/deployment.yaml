apiVersion: apps/v1
kind: Deployment
metadata:
  name: hayday-backend
  namespace: hayday
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hayday-backend
  template:
    metadata:
      labels:
        app: hayday-backend
    spec:
      containers:
      - name: backend
        image: hayday-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: REDIS_URL
          value: redis://redis-service:6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hayday-backend-service
  namespace: hayday
spec:
  selector:
    app: hayday-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hayday-backend-hpa
  namespace: hayday
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hayday-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80