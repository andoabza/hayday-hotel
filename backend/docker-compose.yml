
services:
  mysql:
    image: mysql:8
    container_name: hayday_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: hayday_hotel
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - hayday_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hayday_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hayday_network
    command: redis-server --appendonly yes

  backend:
    build: .
    container_name: hayday_backend
    environment:
      DATABASE_URL: mysql://root:${DB_PASSWORD}@mysql:3306/hayday_hotel
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
    networks:
      - hayday_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: hayday_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - hayday_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: hayday_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - hayday_network

  grafana:
    image: grafana/grafana
    container_name: hayday_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hayday_network
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  hayday_network:
    driver: bridge